<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart — MultiVendor</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="grid-floor"></div>
  <div class="content-layer">
    <div id="navbar"></div>
    <main style="max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem">

      <h1 style="font-size:1.75rem;font-weight:800;letter-spacing:-.02em;margin-bottom:1.75rem">
        <span class="neon-purple">Your</span> <span class="neon-gold">Cart</span>
      </h1>

      <div id="spinner" style="display:flex;justify-content:center;padding:4rem"><div class="spinner"></div></div>

      <div id="cartWrap" style="display:none">
        <div id="items" style="display:flex;flex-direction:column;gap:.85rem"></div>

        <!-- Totals + Checkout -->
        <div id="checkoutSection" style="display:none;margin-top:2rem">
          <div class="glass" style="padding:1.75rem">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem">
              <h2 style="font-size:1.1rem;font-weight:800;letter-spacing:-.01em;color:var(--gold);margin:0">Order Summary</h2>
              <span style="font-size:1.3rem;font-weight:800;color:var(--gold)">Total: <span id="totalDisplay">$0.00</span></span>
            </div>
            <h3 style="font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin:0 0 .85rem">Shipping Address</h3>
            <form id="checkoutForm" style="display:grid;grid-template-columns:1fr 1fr;gap:.65rem">
              <input name="street"  placeholder="Street address" required class="input" style="grid-column:1/-1">
              <input name="city"    placeholder="City"           required class="input">
              <input name="state"   placeholder="State / Region"          class="input">
              <input name="zip"     placeholder="ZIP code"                class="input">
              <input name="country" placeholder="Country"        required class="input">
              <div style="grid-column:1/-1;margin-top:.5rem">
                <button type="submit" class="btn btn-gold" style="width:100%;padding:.8rem;font-size:1rem;font-weight:800">
                  Place Order — Mock Pay
                </button>
              </div>
              <p id="orderErr" style="grid-column:1/-1;color:#f87171;font-size:.85rem;display:none"></p>
            </form>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../js/ui.js"></script>
  <script type="module">
    import { api, assetUrl } from '../js/api.js';
    import { auth } from '../js/auth.js';
    import { cartStore } from '../js/cart-store.js';
    import { renderNavbar } from '../js/navbar.js';
    import { toast } from '../js/toast.js';

    if (!auth.require('CUSTOMER')) throw new Error();
    await renderNavbar();

    let cartData = null;

    async function loadCart() {
      const { data } = await api.get('/cart');
      cartData = data;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('cartWrap').style.display = 'block';
      renderItems(data.items || []);
    }

    function renderItems(items) {
      const el = document.getElementById('items');
      const cs = document.getElementById('checkoutSection');

      if (!items.length) {
        el.innerHTML = `
          <div style="text-align:center;padding:4rem;color:var(--text-muted)">
            <p style="font-size:1.15rem;font-weight:700;margin-bottom:1rem">Your cart is empty</p>
            <a href="../index.html" class="btn btn-gold" style="text-decoration:none">Browse Products</a>
          </div>`;
        cs.style.display = 'none';
        return;
      }

      const total = items.reduce((s,i)=>s+Number(i.product.price)*i.quantity, 0);
      document.getElementById('totalDisplay').textContent = `$${total.toFixed(2)}`;
      cs.style.display = 'block';

      el.innerHTML = items.map(item => `
        <div class="glass" style="display:flex;gap:1rem;align-items:center;padding:1rem" data-pid="${item.product.id}">
          <img src="${assetUrl(item.product.imageUrls?.[0])||'https://placehold.co/80x80/0a0512/8a2be2?text=?'}"
            style="width:72px;height:72px;object-fit:cover;border-radius:10px;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <p style="font-weight:700;font-size:.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.product.title}</p>
            <p style="color:var(--gold);font-weight:800;font-size:.95rem;margin-top:.2rem">$${Number(item.product.price).toFixed(2)}</p>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem;flex-shrink:0">
            <input type="number" min="1" max="${item.product.stockQty}" value="${item.quantity}"
              class="input qty-input" style="width:60px;text-align:center;padding:.35rem">
            <button class="remove-btn" aria-label="Remove"
              style="background:none;border:none;color:#f87171;cursor:pointer;font-size:1.5rem;line-height:1;padding:.15rem .3rem">×</button>
          </div>
        </div>`).join('');

      // Qty — update single item value inline, no full reload
      el.querySelectorAll('.qty-input').forEach(inp => {
        inp.addEventListener('change', async e => {
          e.preventDefault();
          const pid = e.target.closest('[data-pid]').dataset.pid;
          const qty = Math.max(1, parseInt(e.target.value)||1);
          e.target.value = qty; // snap to valid value immediately
          try {
            await api.put('/cart/items', { productId: pid, quantity: qty });
            // Update total without re-rendering rows
            const item = cartData.items.find(i => i.product.id === pid);
            if (item) item.quantity = qty;
            const newTotal = cartData.items.reduce((s,i)=>s+Number(i.product.price)*i.quantity, 0);
            document.getElementById('totalDisplay').textContent = `$${newTotal.toFixed(2)}`;
            window.dispatchEvent(new Event('cart:updated'));
          } catch (ex) { toast(ex.message, 'error'); e.target.value = cartData.items.find(i=>i.product.id===pid)?.quantity||1; }
        });
      });

      // Remove
      el.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.preventDefault();
          const row = e.target.closest('[data-pid]');
          const pid = row.dataset.pid;
          row.style.opacity = '0.4';
          row.style.pointerEvents = 'none';
          try {
            await cartStore.remove(pid);
            cartData.items = cartData.items.filter(i => i.product.id !== pid);
            renderItems(cartData.items);
          } catch (ex) { toast(ex.message, 'error'); row.style.opacity='1'; row.style.pointerEvents=''; }
        });
      });
    }

    document.getElementById('checkoutForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const errEl = document.getElementById('orderErr');
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Processing…';
      const fd = new FormData(e.target);
      try {
        const { data: order } = await api.post('/orders/checkout', {
          shippingAddress: {
            street:  fd.get('street'),
            city:    fd.get('city'),
            state:   fd.get('state'),
            zip:     fd.get('zip'),
            country: fd.get('country'),
          },
        });
        toast(`Order #${order.id.slice(-6).toUpperCase()} placed!`);
        setTimeout(() => location.href = 'orders.html', 1200);
      } catch (ex) {
        errEl.textContent = ex.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Place Order — Mock Pay';
      }
    });

    loadCart();
  </script>
</body>
</html>
